[embedding]
provider = "litellm"
base_model = "gpt-5.2"
base_dimension = 1024
batch_size = 16
concurrent_request_limit = 256
api_base = "https://yostoken.top/v1"

[completion_embedding]
provider = "litellm"
base_model = "gpt-5.2"
base_dimension = 1024
batch_size = 16
api_base = "https://yostoken.top/v1"

[ingestion]
provider = "r2r"
chunking_strategy = "recursive"
chunk_size = 1024
chunk_overlap = 512
automatic_extraction = false
skip_document_summary = true

[completion]
provider = "r2r"

[database]
provider = "postgres"

[file]
provider = "postgres"

[auth]
require_authentication = false

[orchestration]
provider = "simple"
